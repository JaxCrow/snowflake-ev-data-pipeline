name: ev_market_analytics
tables:
  - name: fact_ev_registrations
    base_table:
      database: EV_PROJECT_DB
      schema: GOLD
      table: FACT_EV_REGISTRATIONS
    description: >
      Individual EV registration records with vehicle details, geographic location,
      manufacturer, model year, electric range, CAFV incentive eligibility, and EV type.
      Each row represents a unique registered electric vehicle identified by VIN.
    dimensions:
      - name: vin
        synonyms:
          - vehicle identification number
          - registration id
        expr: VIN
        description: Unique Vehicle Identification Number (truncated to 10 chars).
        data_type: VARCHAR
        unique: true
      - name: make
        synonyms:
          - manufacturer
          - brand
          - automaker
          - car company
        expr: MAKE
        description: Vehicle manufacturer name (e.g., TESLA, CHEVROLET, FORD, BMW).
        data_type: VARCHAR
        sample_values:
          - TESLA
          - CHEVROLET
          - FORD
          - BMW
          - KIA
          - NISSAN
          - TOYOTA
          - HYUNDAI
          - VOLKSWAGEN
          - RIVIAN
      - name: model
        synonyms:
          - vehicle model
          - car model
        expr: MODEL
        description: Vehicle model name (e.g., MODEL 3, BOLT EV, MUSTANG MACH-E).
        data_type: VARCHAR
        sample_values:
          - MODEL 3
          - MODEL Y
          - BOLT EV
          - LEAF
          - MUSTANG MACH-E
          - WRANGLER
      - name: model_year
        synonyms:
          - year
          - vehicle year
          - registration year
        expr: MODEL_YEAR
        description: The model year of the vehicle. Ranges from 2011 to 2024.
        data_type: NUMBER
      - name: ev_type
        synonyms:
          - vehicle type
          - electric vehicle type
          - powertrain type
          - BEV
          - PHEV
          - battery electric
          - plug-in hybrid
        expr: EV_TYPE
        description: >
          Type of electric vehicle. BEV = Battery Electric Vehicle (fully electric).
          PHEV = Plug-in Hybrid Electric Vehicle (electric + gas engine).
        data_type: VARCHAR
        sample_values:
          - Battery Electric Vehicle (BEV)
          - Plug-in Hybrid Electric Vehicle (PHEV)
      - name: cafv_eligibility
        synonyms:
          - incentive eligibility
          - clean fuel eligibility
          - CAFV status
          - eligible for incentives
        expr: CAFV_ELIGIBILITY
        description: >
          Clean Alternative Fuel Vehicle eligibility status. Determines whether
          the vehicle qualifies for state/federal EV incentives.
        data_type: VARCHAR
        sample_values:
          - Clean Alternative Fuel Vehicle Eligible
          - Not eligible due to low battery range
          - Eligibility unknown as battery range has not been researched
      - name: city
        synonyms:
          - town
          - municipality
        expr: CITY
        description: City where the vehicle is registered.
        data_type: VARCHAR
      - name: county
        synonyms:
          - region
          - district
        expr: COUNTY
        description: County where the vehicle is registered.
        data_type: VARCHAR
      - name: state
        synonyms:
          - state code
          - US state
          - region
        expr: STATE
        description: US state abbreviation where the vehicle is registered.
        data_type: VARCHAR
        sample_values:
          - WA
          - CA
          - TX
          - VA
          - CO
          - MD
          - CT
          - IL
          - UT
          - KS
      - name: zip_code
        synonyms:
          - postal code
          - zip
        expr: ZIP_CODE
        description: ZIP code of the vehicle registration address.
        data_type: VARCHAR
      - name: legislative_district
        expr: LEGISLATIVE_DISTRICT
        description: Legislative district number for the registration address.
        data_type: VARCHAR
      - name: electric_utility
        synonyms:
          - utility provider
          - power company
          - energy provider
        expr: ELECTRIC_UTILITY
        description: Electric utility company serving the registration address.
        data_type: VARCHAR
      - name: census_tract
        expr: CENSUS_TRACT_2020
        description: 2020 US Census tract code for the registration address.
        data_type: VARCHAR
    time_dimensions:
      - name: registration_year
        synonyms:
          - year
          - model year
        expr: MODEL_YEAR
        description: Model year used as the time dimension for trend analysis.
        data_type: NUMBER
    metrics:
      - name: total_registrations
        synonyms:
          - total vehicles
          - vehicle count
          - number of EVs
          - registration count
          - how many
        expr: COUNT(VIN)
        description: Total number of registered electric vehicles.
        data_type: NUMBER
      - name: avg_electric_range
        synonyms:
          - average range
          - mean range
          - range
          - miles per charge
        expr: AVG(ELECTRIC_RANGE)
        description: Average electric-only driving range in miles.
        data_type: FLOAT
      - name: max_electric_range
        synonyms:
          - highest range
          - best range
          - longest range
        expr: MAX(ELECTRIC_RANGE)
        description: Maximum electric range observed in miles.
        data_type: NUMBER
      - name: avg_base_msrp
        synonyms:
          - average price
          - mean price
          - MSRP
        expr: AVG(BASE_MSRP)
        description: Average base manufacturer suggested retail price.
        data_type: FLOAT
      - name: unique_models
        synonyms:
          - model count
          - number of models
          - model variety
        expr: COUNT(DISTINCT MODEL)
        description: Number of distinct vehicle models.
        data_type: NUMBER
      - name: unique_manufacturers
        synonyms:
          - manufacturer count
          - brand count
          - number of brands
        expr: COUNT(DISTINCT MAKE)
        description: Number of distinct vehicle manufacturers.
        data_type: NUMBER
      - name: cafv_eligible_count
        synonyms:
          - incentive eligible
          - CAFV count
          - eligible vehicles
        expr: COUNT(CASE WHEN CAFV_ELIGIBILITY = 'Clean Alternative Fuel Vehicle Eligible' THEN 1 END)
        description: Number of vehicles eligible for Clean Alternative Fuel Vehicle incentives.
        data_type: NUMBER
      - name: cafv_eligible_pct
        synonyms:
          - incentive eligibility rate
          - CAFV percentage
          - percent eligible
        expr: ROUND(COUNT(CASE WHEN CAFV_ELIGIBILITY = 'Clean Alternative Fuel Vehicle Eligible' THEN 1 END) * 100.0 / NULLIF(COUNT(*), 0), 1)
        description: Percentage of vehicles eligible for CAFV incentives.
        data_type: FLOAT
      - name: bev_count
        synonyms:
          - battery electric count
          - full electric count
        expr: COUNT(CASE WHEN EV_TYPE = 'Battery Electric Vehicle (BEV)' THEN 1 END)
        description: Number of Battery Electric Vehicles (fully electric).
        data_type: NUMBER
      - name: phev_count
        synonyms:
          - plug-in hybrid count
          - hybrid count
        expr: COUNT(CASE WHEN EV_TYPE = 'Plug-in Hybrid Electric Vehicle (PHEV)' THEN 1 END)
        description: Number of Plug-in Hybrid Electric Vehicles.
        data_type: NUMBER
      - name: bev_market_share
        synonyms:
          - BEV percentage
          - battery electric share
        expr: ROUND(COUNT(CASE WHEN EV_TYPE = 'Battery Electric Vehicle (BEV)' THEN 1 END) * 100.0 / NULLIF(COUNT(*), 0), 1)
        description: Market share percentage of Battery Electric Vehicles.
        data_type: FLOAT
      - name: market_share_pct
        synonyms:
          - share
          - percentage of total
          - market penetration
        expr: ROUND(COUNT(*) * 100.0 / (SELECT COUNT(*) FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS), 1)
        description: Market share percentage of a given group relative to total registrations.
        data_type: FLOAT
  - name: dim_manufacturers
    base_table:
      database: EV_PROJECT_DB
      schema: GOLD
      table: DIM_MANUFACTURERS_GOLD
    description: >
      Manufacturer dimension table with manufacturer details including country of origin
      and whether they are a legacy automaker. Replicated from NeonDB PostgreSQL.
    dimensions:
      - name: manufacturer_id
        expr: MANUFACTURER_ID
        description: Unique identifier for the manufacturer.
        data_type: NUMBER
        unique: true
      - name: manufacturer_name
        synonyms:
          - make
          - brand
          - automaker
        expr: MANUFACTURER_NAME
        description: Name of the vehicle manufacturer.
        data_type: VARCHAR
        unique: true
      - name: country
        synonyms:
          - country of origin
          - headquarters
          - home country
        expr: COUNTRY
        description: Country where the manufacturer is headquartered.
        data_type: VARCHAR
        sample_values:
          - United States
          - Japan
          - Germany
          - South Korea
          - Sweden
          - UK
          - Italy
          - Norway
relationships:
  - name: registrations_to_manufacturers
    left_table: fact_ev_registrations
    right_table: dim_manufacturers
    relationship_columns:
      - left_column: MAKE
        right_column: MANUFACTURER_NAME
verified_queries:
  - name: yoy_growth_trend
    question: What is the YoY growth trend in EV registrations?
    sql: |
      SELECT
        MODEL_YEAR,
        COUNT(*) AS REGISTRATIONS,
        LAG(COUNT(*)) OVER (ORDER BY MODEL_YEAR) AS PREV_YEAR_REGISTRATIONS,
        CASE WHEN LAG(COUNT(*)) OVER (ORDER BY MODEL_YEAR) > 0
          THEN ROUND((COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY MODEL_YEAR)) * 100.0 / LAG(COUNT(*)) OVER (ORDER BY MODEL_YEAR), 1)
        END AS YOY_GROWTH_PCT
      FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS
      WHERE MODEL_YEAR >= 2015
      GROUP BY MODEL_YEAR
      ORDER BY MODEL_YEAR
    verified_at: 1713456000
    verified_by: JAXDAMON
  - name: bev_vs_phev_penetration
    question: What is our market penetration by vehicle type BEV vs PHEV?
    sql: |
      SELECT
        EV_TYPE,
        COUNT(*) AS TOTAL_VEHICLES,
        ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS MARKET_SHARE_PCT
      FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS
      GROUP BY EV_TYPE
    verified_at: 1713456000
    verified_by: JAXDAMON
  - name: tesla_vs_others_by_state
    question: Compare Tesla vs other manufacturers in market share by state
    sql: |
      SELECT
        STATE,
        ROUND(COUNT(CASE WHEN MAKE = 'TESLA' THEN 1 END) * 100.0 / COUNT(*), 1) AS TESLA_SHARE_PCT,
        ROUND(COUNT(CASE WHEN MAKE != 'TESLA' THEN 1 END) * 100.0 / COUNT(*), 1) AS OTHER_SHARE_PCT,
        COUNT(*) AS TOTAL_VEHICLES
      FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS
      GROUP BY STATE
      ORDER BY TOTAL_VEHICLES DESC
    verified_at: 1713456000
    verified_by: JAXDAMON
  - name: cafv_incentive_eligibility
    question: What percentage of EVs are eligible for CAFV incentives?
    sql: |
      SELECT
        CAFV_ELIGIBILITY,
        COUNT(*) AS TOTAL,
        ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS PERCENTAGE
      FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS
      GROUP BY CAFV_ELIGIBILITY
      ORDER BY TOTAL DESC
    verified_at: 1713456000
    verified_by: JAXDAMON
  - name: top_models_by_county
    question: Which vehicle models are trending in specific regions?
    sql: |
      SELECT
        COUNTY,
        STATE,
        MODEL,
        MAKE,
        COUNT(*) AS REGISTRATIONS
      FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS
      GROUP BY COUNTY, STATE, MODEL, MAKE
      ORDER BY REGISTRATIONS DESC
      LIMIT 20
    verified_at: 1713456000
    verified_by: JAXDAMON
  - name: ev_adoption_by_state
    question: Which regions have the highest EV adoption rates?
    sql: |
      SELECT
        STATE,
        COUNT(*) AS TOTAL_REGISTRATIONS,
        COUNT(DISTINCT MAKE) AS UNIQUE_MANUFACTURERS,
        COUNT(DISTINCT MODEL) AS UNIQUE_MODELS,
        ROUND(AVG(ELECTRIC_RANGE), 0) AS AVG_RANGE,
        ROUND(COUNT(CASE WHEN EV_TYPE = 'Battery Electric Vehicle (BEV)' THEN 1 END) * 100.0 / COUNT(*), 1) AS BEV_PCT
      FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS
      GROUP BY STATE
      ORDER BY TOTAL_REGISTRATIONS DESC
    verified_at: 1713456000
    verified_by: JAXDAMON
  - name: manufacturer_market_share
    question: What is the market share by manufacturer?
    sql: |
      SELECT
        MAKE,
        COUNT(*) AS TOTAL_VEHICLES,
        ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS MARKET_SHARE_PCT,
        ROUND(AVG(ELECTRIC_RANGE), 0) AS AVG_RANGE
      FROM EV_PROJECT_DB.GOLD.FACT_EV_REGISTRATIONS
      GROUP BY MAKE
      ORDER BY TOTAL_VEHICLES DESC
    verified_at: 1713456000
    verified_by: JAXDAMON
